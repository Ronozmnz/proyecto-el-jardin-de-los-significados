<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/icono-paginaweb.jpg" type="image/png">
    <title>Catálogo - El Jardín de los Significados</title>
    <link rel="stylesheet" href="css/maquillaje.css">
</head>
<body>

    <header class="header-main">
        <div class="logo-container">
            <img src="./img/icono-paginaweb.jpg" alt="Logo" class="logo-image">
        </div>
        <nav class="nav-container">
            <ul class="nav-list">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html" class="active">Catálogo</a></li>
                <li><a href="diccionario.html">Diccionario</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="filters">
            <h2>Nuestras Flores</h2>
            <div class="filter-buttons">
                <button onclick="filterFlowers('Todas')">Todas</button>
                <button onclick="filterFlowers('Rosas')">Rosas</button>
                <button onclick="filterFlowers('Girasoles')">Girasoles</button>
                <button onclick="filterFlowers('Orquídeas')">Orquídeas</button>
                <button onclick="filterFlowers('Exóticas')">Exóticas</button>
            </div>
        </section>

        <section id="catalog-container" class="catalog-grid">
        </section>
    </main>

    <div id="meaning-modal" class="modal" style="display:none;">
        <div id="modal-content-wrapper">
            <button class="btn-close" onclick="closeModal()">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="js/logica.js"></script>

    <footer class="footer-container">
        <p>&copy; 2026 El Jardín de los Significados - Proyecto Académico sobre el lenguaje de las flores.</p>
        <div class="social-icons-container">
            <a href="https://www.facebook.com" target="_blank" aria-label="Visita nuestra página de Facebook"><img src="img/footer/facebook.png" alt="Facebook" class="social-icon"></a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Síguenos en Instagram"><img src="img/footer/instagram.png" alt="Instagram" class="social-icon"></a>
            <a href="https://www.youtube.com" target="_blank" aria-label="Síguenos en Youtube"><img src="img/footer/youtube.png" alt="Youtube" class="social-icon"></a>
        </div>
    </footer>


</body>
</html>
