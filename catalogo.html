<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/icono-paginaweb.jpg" type="image/png">
    <title>Catálogo - El Jardín de los Significados</title>
    <link rel="stylesheet" href="css/maquillaje.css">
</head>
<body>

    <header class="cabecera-principal">
        <div class="contenedor-logo">
            <img src="./img/icono-paginaweb.jpg" alt="Logo" class="imagen-logo">
        </div>
        <nav class="contenedor-navegacion">
            <ul class="lista-navegacion">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html" class="activo">Catálogo</a></li>
                <li><a href="diccionario.html">Diccionario</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="filtros">
            <h2>Nuestras Flores</h2>
            <div class="botones-filtro">
                <button onclick="filtrarFlores('Todas')">Todas</button>
                <button onclick="filtrarFlores('Rosas')">Rosas</button>
                <button onclick="filtrarFlores('Girasoles')">Girasoles</button>
                <button onclick="filtrarFlores('Orquídeas')">Orquídeas</button>
                <button onclick="filtrarFlores('Exóticas')">Exóticas</button>
            </div>
        </section>

        <section id="contenedor-catalogo" class="rejilla-catalogo">
        </section>
    </main>

    <div id="modal-significado" class="modal" style="display:none;">
        <div id="envoltura-contenido-modal">
            <button class="btn-cerrar" onclick="cerrarModal()">×</button>
            <div id="contenido-modal"></div>
        </div>
    </div>

    <script src="js/logica.js"></script>

    <footer class="contenedor-pie">
        <p>&copy; 2026 El Jardín de los Significados - Proyecto Académico sobre el lenguaje de las flores.</p>
        <div class="contenedor-iconos-sociales">
            <a href="https://www.facebook.com" target="_blank" aria-label="Visita nuestra página de Facebook"><img src="img/footer/facebook.png" alt="Facebook" class="icono-social"></a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Síguenos en Instagram"><img src="img/footer/instagram.png" alt="Instagram" class="icono-social"></a>
            <a href="https://www.youtube.com" target="_blank" aria-label="Síguenos en Youtube"><img src="img/footer/youtube.png" alt="Youtube" class="icono-social"></a>
        </div>
    </footer>


</body>
</html>
