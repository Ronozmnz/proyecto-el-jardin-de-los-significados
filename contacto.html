<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/icono-paginaweb.jpg" type="image/png">
    <title>Contacto - El Jardín de los Significados</title>
    <link rel="stylesheet" href="css/maquillaje.css">
    
</head>
<body>

    <header class="header-main">
        <div class="logo-container">
            <img src="./img/icono-paginaweb.jpg" alt="Logo" class="logo-image">
        </div>
        <nav class="nav-container">
            <ul class="nav-list">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="diccionario.html" class="active">Diccionario</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1>Contáctanos</h1>
            <p>¿Tienes alguna pregunta, sugerencia o simplemente quieres compartir tu amor por las flores? ¡Estamos aquí para escucharte!</p>
        </section>

        <section class="contact-form-section">
            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" title="Solo se permiten letras y espacios">
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="ubicacion">¿Desde dónde nos visitas? (Ciudad/País):</label>
                    <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: Caracas, Venezuela" required>
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="6" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer class="footer-container">
        <p>&copy; 2026 El Jardín de los Significados - Proyecto Académico sobre el lenguaje de las flores.</p>
        <div class="social-icons-container">
            <a href="https://www.facebook.com" target="_blank" aria-label="Visita nuestra página de Facebook"><img src="img/footer/facebook.png" alt="Facebook" class="social-icon"></a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Síguenos en Instagram"><img src="img/footer/instagram.png" alt="Instagram" class="social-icon"></a>
            <a href="https://www.youtube.com" target="_blank" aria-label="Síguenos en Youtube"><img src="img/footer/youtube.png" alt="Youtube" class="social-icon"></a>
        </div>
    </footer>


</body>
</html>
