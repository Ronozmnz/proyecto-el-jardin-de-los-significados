<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/icono-paginaweb.jpg" type="image/png">
    <title>Contacto - El Jardín de los Significados</title>
    <link rel="stylesheet" href="css/maquillaje.css">
    
</head>
<body id="inicioarriba">

    <header class="cabecera-principal">
        <div class="contenedor-logo">
            <img src="./img/icono-paginaweb.jpg" alt="Logo" class="imagen-logo">
        </div>
        <nav class="contenedor-navegacion">
            <ul class="lista-navegacion">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="diccionario.html">Diccionario</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="seccion-hero">
            <h1>Contáctanos</h1>
            <p>¿Tienes alguna pregunta, sugerencia o simplemente quieres compartir tu amor por las flores? ¡Estamos aquí para escucharte!</p>
        </section>

        <section class="seccion-formulario-contacto">
            <form action="#" method="POST" class="formulario-contacto">
                <div class="grupo-formulario">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" title="Solo se permiten letras y espacios">
                </div>
                <div class="grupo-formulario">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="grupo-formulario">
                    <label for="ubicacion">¿Desde dónde nos visitas? (Estado/País):</label>
                    <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: Carabobo, Venezuela" required>
                </div>
                <div class="grupo-formulario">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="6" required></textarea>
                </div>
                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </section>
        <a href="#inicioarriba" class="boton-arriba">Volver arriba</a>
    </main>

    <footer class="contenedor-pie">
        <p>&copy; 2026 El Jardín de los Significados - Proyecto Académico sobre el lenguaje de las flores.</p>
        <div class="contenedor-iconos-sociales">
            <a href="https://www.facebook.com" target="_blank" aria-label="Visita nuestra página de Facebook"><img src="img/footer/facebook.png" alt="Facebook" class="icono-social"></a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Síguenos en Instagram"><img src="img/footer/instagram.png" alt="Instagram" class="icono-social"></a>
            <a href="https://www.youtube.com" target="_blank" aria-label="Síguenos en Youtube"><img src="img/footer/youtube.png" alt="Youtube" class="icono-social"></a>
        </div>
    </footer>


</body>
</html>
